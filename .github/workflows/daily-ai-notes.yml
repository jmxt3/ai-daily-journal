name: Daily AI Notes (Randomized)

on:
  schedule:
    # Run exactly 6 times a day (every 4 hours at the 17th minute) to save Actions minutes
    - cron: '17 */4 * * *'
  workflow_dispatch:       # Allows manual testing

permissions:
  contents: write
  id-token: write   # Required for GCP Workload Identity Federation

jobs:
  generate-note:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Decide whether to run
        id: decision
        run: |
          # If manually triggered via GitHub UI, always run
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run_job=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check the timestamp of the latest commit to avoid missing a day
          LATEST_COMMIT_TS=$(git log -1 --format=%ct)
          CURRENT_TS=$(date +%s)
          DIFF_HOURS=$(( (CURRENT_TS - LATEST_COMMIT_TS) / 3600 ))
          
          if [ $DIFF_HOURS -ge 22 ]; then
            echo "No commits in $DIFF_HOURS hours. Forcing execution to guarantee a daily commit!"
            echo "run_job=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Roll a random number between 0 and 99
          CHANCE=$((RANDOM % 100))
          
          # 65% chance to execute. Out of 6 runs maximum, this gives ~4 commits
          # on average per day, but will still wildly fluctuate between isolated 1s and full 6s.
          if [ $CHANCE -lt 65 ]; then
            echo "Random roll: $CHANCE (<65). Running the workflow!"
            echo "run_job=true" >> $GITHUB_OUTPUT
          else
            echo "Random roll: $CHANCE (>=65). Skipping this time."
            echo "run_job=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies with uv
        if: steps.decision.outputs.run_job == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        if: steps.decision.outputs.run_job == 'true'
        run: uv sync --frozen

      - name: Authenticate to Google Cloud
        id: auth
        if: steps.decision.outputs.run_job == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Generate AI note with your API
        id: generate
        if: steps.decision.outputs.run_job == 'true'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.auth_token }}
        run: |
          NOTE=$(uv run python .github/scripts/generate_daily_note.py)
          echo "note<<EOF" >> $GITHUB_ENV
          echo "$NOTE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Append note to README and commit
        if: steps.decision.outputs.run_job == 'true'
        run: |
          echo "" >> README.md
          echo "## 📅 $(date -u +'%Y-%m-%d %H:%M UTC')" >> README.md
          echo "" >> README.md
          echo "$note" >> README.md
          echo "" >> README.md
          echo "---" >> README.md

          git config --global user.name "jmxt3"
          git config --global user.email "jmxt3@users.noreply.github.com"
          git add README.md
          git commit -m "Daily AI note - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push