steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/pixelwood-462401/ai-daily-journal-repo/ai-daily-journal:latest'
      - '.'

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/pixelwood-462401/ai-daily-journal-repo/ai-daily-journal:latest'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-daily-journal'
      - '--image'
      - 'us-central1-docker.pkg.dev/pixelwood-462401/ai-daily-journal-repo/ai-daily-journal:latest'
      - '--region'
      - 'us-central1'
      - '--project'
      - 'pixelwood-462401'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'MODEL=gemini-2.0-flash-lite'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest,API_KEY=API_KEY:latest'
